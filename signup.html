<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - BRICK</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">
        <img src="images/brick-logo-new.png" alt="BRICK Logo">
        BRICK
      </a>
      <div class="nav-content">
        <div class="navbar-links">
          <a href="login.html" class="btn btn-outline">Login</a>
        </div>
      </div>
    </div>
  </nav>

  <main>
    <div class="auth-container">
      <!-- Left Side Image -->
      <div class="auth-image d-none d-md-flex">
        <div class="auth-image-content">
          <div style="font-size: 4rem; margin-bottom: var(--spacing-lg);">🎓</div>
          <h2 style="margin-bottom: var(--spacing-md);">Find Your Perfect Roommate</h2>
          <p>Join thousands of students and landlords using BRICK to find compatible roommates and manage shared living spaces.</p>
          <div style="margin-top: var(--spacing-xl); color: rgba(255, 255, 255, 0.8);">
            <p style="margin: 0;">✓ Smart matching algorithm</p>
            <p style="margin: var(--spacing-sm) 0;">✓ Apartment suggestions</p>
            <p style="margin: var(--spacing-sm) 0;">✓ Shared expense tracking</p>
          </div>
        </div>
      </div>

      <!-- Right Side Form -->
      <div class="auth-form">
        <div class="auth-form-content">
          <h1 id="form-title">Create Your Account</h1>

          <!-- Alert Container -->
          <div id="alert-container"></div>

          <!-- Student Form -->
          <form id="studentForm" class="form-container active">
            <div class="form-group">
              <label for="student-name">Full Name</label>
              <input type="text" id="student-name" required placeholder="John Doe">
            </div>

            <div class="form-group">
              <label for="student-email">Email Address</label>
              <input type="email" id="student-email" required placeholder="john@university.edu">
            </div>

            <div class="form-group">
              <label for="student-password">Password</label>
              <input type="password" id="student-password" required placeholder="••••••••">
            </div>

            <div class="form-group">
              <label for="student-gender">Your Gender</label>
              <select id="student-gender" required>
                <option value="">Select your gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
            </div>

            <div class="form-group">
              <label for="student-budget">Monthly Budget (₦)</label>
              <input type="number" id="student-budget" required placeholder="50000" min="0">
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="width: 100%; margin-top: var(--spacing-lg);">Create Account</button>

            <div class="form-link">
              Already have an account? <a href="login.html">Login here</a>
            </div>
          </form>


        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/mockData.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/navigation.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      showForm('studentForm');
      document.getElementById('studentForm').addEventListener('submit', handleStudentSignup);
    });

    function handleStudentSignup(e) {
      e.preventDefault();

      if (!validateForm('studentForm')) {
        showError('Please fill in all required fields');
        return;
      }

      const formData = {
        name: document.getElementById('student-name').value,
        email: document.getElementById('student-email').value,
        gender: document.getElementById('student-gender').value,
        budget: document.getElementById('student-budget').value
      };

      const result = window.authManager.signupStudent(formData);

      if (result.success) {
        showSuccess('Account created successfully! Redirecting to dashboard...');
        setTimeout(() => {
          window.location.href = 'student/dashboard.html';
        }, 1500);
      } else {
        showError(result.error);
      }
    }



    function showError(message) {
      const container = document.getElementById('alert-container');
      const alert = document.createElement('div');
      alert.className = 'alert alert-error';
      alert.textContent = message;
      container.innerHTML = '';
      container.appendChild(alert);

      setTimeout(() => {
        alert.remove();
      }, 3000);
    }

    function showSuccess(message) {
      const container = document.getElementById('alert-container');
      const alert = document.createElement('div');
      alert.className = 'alert alert-success';
      alert.textContent = message;
      container.innerHTML = '';
      container.appendChild(alert);
    }
  </script>
</body>
</html>
